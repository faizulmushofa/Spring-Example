<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FileVault - Login & Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="auth.css">
</head>
<body>

    <div class="auth-container">
        <div class="brand">
            <span class="icon">🗂️</span>
            <h1>FileVault</h1>
            <p>Simpan filemu dengan aman</p>
        </div>

        <div class="card">
            <!-- TABS -->
            <div class="tabs">
                <button id="tab-login" class="active" onclick="switchTab('login')">Login</button>
                <button id="tab-register" onclick="switchTab('register')">Register</button>
            </div>

            <!-- LOGIN FORM -->
            <form id="form-login" onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" required placeholder="user@email.com">
                </div>
                <div class="input-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" required placeholder="••••••••">
                </div>
                <div id="login-error" class="error-msg"></div>
                <button type="submit" class="btn-primary" id="btn-login">Masuk</button>
            </form>

            <!-- REGISTER FORM -->
            <form id="form-register" class="hidden" onsubmit="handleRegister(event)">
                <div class="row">
                    <div class="input-group">
                        <label for="reg-firstname">First Name</label>
                        <input type="text" id="reg-firstname" required placeholder="John">
                    </div>
                    <div class="input-group">
                        <label for="reg-lastname">Last Name</label>
                        <input type="text" id="reg-lastname" required placeholder="Doe">
                    </div>
                </div>
                <div class="input-group">
                    <label for="reg-username">Username</label>
                    <input type="text" id="reg-username" required placeholder="johndoe">
                </div>
                <div class="input-group">
                    <label for="reg-email">Email</label>
                    <input type="email" id="reg-email" required placeholder="user@email.com">
                </div>
                <div class="input-group">
                    <label for="reg-password">Password</label>
                    <input type="password" id="reg-password" required placeholder="••••••••">
                </div>
                <div id="reg-error" class="error-msg"></div>
                <div id="reg-success" class="success-msg"></div>
                <button type="submit" class="btn-primary" id="btn-register">Daftar Sekarang</button>
            </form>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
