<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Spring Architecture LMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background-color: #f0f9ff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
        }
        .auth-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 4px 24px rgba(14, 165, 233, 0.08);
        }
        .auth-logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.3rem;
            font-weight: 700;
            color: #0ea5e9;
            margin-bottom: 0.25rem;
        }
        .auth-logo span {
            color: #0369a1;
        }
        .auth-subtitle {
            color: #64748b;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }
        .alert {
            margin-top: 0.75rem;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            display: none;
        }
        .alert.error {
            background: #fef2f2;
            color: #991b1b;
            border: 1px solid #fecaca;
            display: block;
        }
        .alert.success {
            background: #f0fdf4;
            color: #166534;
            border: 1px solid #bbf7d0;
            display: block;
        }
        .divider {
            border-top: 1px solid #e2e8f0;
            margin: 1.5rem 0;
        }
        .footer-link {
            text-align: center;
            font-size: 0.9rem;
            color: #64748b;
        }
        .footer-link a {
            color: #0ea5e9;
            text-decoration: none;
            font-weight: 500;
        }
        .footer-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-logo">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
                <path d="M6 12v5c3 3 9 3 12 0v-5"/>
            </svg>
            Spring<span>LMS</span>
        </div>
        <p class="auth-subtitle">Create a new account</p>

        <form id="registerForm">
            <div class="form-group">
                <label for="regEmail">Email Address</label>
                <input type="email" id="regEmail" required placeholder="name@example.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label for="regPassword">Password</label>
                <input type="password" id="regPassword" required placeholder="Minimum 6 characters" autocomplete="new-password">
            </div>
            <button type="submit" id="regBtn" style="margin-top: 0.5rem;">Create Account</button>
            <div id="regAlert" class="alert"></div>
        </form>

        <div class="divider"></div>

        <p class="footer-link">
            Already have an account? <a href="login.html">Sign in</a>
        </p>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
