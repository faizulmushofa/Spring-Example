<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Workspace | LMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container dashboard-container">
        <div class="flex-between" style="margin-bottom: 2rem;">
            <div>
                <h1>Admin Workspace</h1>
                <p class="subtitle">Welcome, <span id="userEmail" style="color:var(--text-main);font-weight:600;"></span></p>
            </div>
            <button class="logout-btn btn-small" onclick="logout()">Sign Out</button>
        </div>

        <div class="nav-tabs">
            <button onclick="showSection('users')" id="btn-users" class="active">Users</button>
            <button onclick="showSection('courses')" id="btn-courses">Courses</button>
            <button onclick="showSection('permissions')" id="btn-permissions">Permissions</button>
        </div>

        <!-- USERS SECTION -->
        <div id="section-users">
            <div class="flex-between" style="margin-bottom: 1rem;">
                <h2>User Management</h2>
                <div class="flex-gap">
                    <select id="userRoleFilter" onchange="fetchUsers()" style="width: auto; padding: 0.5rem 1rem;">
                        <option value="all">All Users</option>
                        <option value="dosen">Lecturers</option>
                        <option value="student">Students</option>
                    </select>
                    <button class="btn-small" onclick="toggleRegisterForm()">+ Register User</button>
                </div>
            </div>

            <!-- Register User Form -->
            <div class="card" id="registerUserCard" style="display:none; border-color: var(--primary); margin-bottom: 1.5rem;">
                <h3>Register New User</h3>
                <form id="adminRegisterForm" style="margin-top: 1rem;">
                    <div class="flex-gap" style="margin-bottom: 1rem;">
                        <div style="flex:1;">
                            <label>Email</label>
                            <input type="email" id="newUserEmail" required placeholder="user@example.com">
                        </div>
                        <div style="flex:1;">
                            <label>Password</label>
                            <input type="password" id="newUserPassword" required placeholder="Min 6 characters">
                        </div>
                        <div style="width: 150px;">
                            <label>Role</label>
                            <select id="newUserRole">
                                <option value="student">Student</option>
                                <option value="dosen">Dosen</option>
                            </select>
                        </div>
                    </div>
                    <div class="flex-gap">
                        <button type="submit" class="btn-success btn-small">Create User</button>
                        <button type="button" class="btn-danger btn-small" onclick="toggleRegisterForm()">Cancel</button>
                    </div>
                    <div id="adminRegMsg" style="margin-top: 0.5rem; font-size: 0.85rem;"></div>
                </form>
            </div>

            <div class="grid-2" id="usersList">
                <div class="empty-state">Loading users...</div>
            </div>
        </div>

        <!-- COURSES SECTION -->
        <div id="section-courses" style="display: none;">
            <div class="flex-between" style="margin-bottom: 1rem;">
                <h2>Course Registry</h2>
                <button class="btn-small" onclick="toggleAdminCourseForm()">+ Create Course</button>
            </div>
            
            <!-- Create Course Form -->
            <div class="card" id="adminCreateCourseCard" style="display:none; border-color: var(--primary); margin-bottom: 1.5rem;">
                <h3 id="adminCourseFormTitle">Create Course (as Admin)</h3>
                <form id="adminCourseForm" style="margin-top: 1rem;">
                    <input type="hidden" id="adminCourseId">
                    <div class="flex-gap" style="margin-bottom: 1rem;">
                        <div style="flex:1;">
                            <label>Course Title</label>
                            <input type="text" id="adminCourseTitle" required placeholder="Software Engineering 101">
                        </div>
                        <div style="flex:1;">
                            <label>Assign to Lecturer (Email)</label>
                            <input type="email" id="adminCourseDosenEmail" required placeholder="dosen@example.com">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="adminCourseDesc" required rows="2" placeholder="Course description..."></textarea>
                    </div>
                    <div class="flex-gap">
                        <button type="submit" class="btn-success btn-small">Save</button>
                        <button type="button" class="btn-danger btn-small" onclick="toggleAdminCourseForm()">Cancel</button>
                    </div>
                </form>
            </div>

            <!-- Enroll Student Form -->
            <div class="card" id="enrollStudentCard" style="display:none; border-color: var(--success); margin-bottom: 1.5rem;">
                <h3>Enroll Student to Course</h3>
                <form id="enrollStudentForm" style="margin-top: 1rem;">
                    <div class="flex-gap" style="margin-bottom: 1rem;">
                        <div style="flex:1;">
                            <label>Student User ID</label>
                            <input type="number" id="enrollStudentId" required placeholder="User ID">
                        </div>
                        <div style="flex:1;">
                            <label>Course ID</label>
                            <input type="number" id="enrollCourseId" required placeholder="Course ID">
                        </div>
                    </div>
                    <div class="flex-gap">
                        <button type="submit" class="btn-success btn-small">Enroll</button>
                        <button type="button" class="btn-danger btn-small" onclick="document.getElementById('enrollStudentCard').style.display='none'">Cancel</button>
                    </div>
                    <div id="enrollMsg" style="margin-top: 0.5rem; font-size: 0.85rem;"></div>
                </form>
            </div>

            <!-- Update Course Form -->
            <div class="card" id="updateCourseCard" style="display:none; border-color: var(--primary); margin-bottom: 1.5rem;">
                <h3>Update Course (ID: <span id="updateCourseIdTxt"></span>)</h3>
                <form id="updateCourseForm" style="margin-top: 1rem;">
                    <input type="hidden" id="updateCourseId">
                    <div class="form-group">
                        <label>Course Title</label>
                        <input type="text" id="updateCourseTitle" required>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="updateCourseDesc" required rows="2"></textarea>
                    </div>
                    <div class="form-group flex-gap" style="align-items: center;">
                        <input type="checkbox" id="updateCourseActive" style="width: auto;">
                        <label style="margin:0;">Active</label>
                    </div>
                    <div class="flex-gap">
                        <button type="submit" class="btn-success btn-small">Save</button>
                        <button type="button" class="btn-danger btn-small" onclick="document.getElementById('updateCourseCard').style.display='none'">Cancel</button>
                    </div>
                </form>
            </div>

            <div class="grid-2" id="adminCoursesList">
                <div class="empty-state">Loading courses...</div>
            </div>
        </div>

        <!-- PERMISSIONS SECTION -->
        <div id="section-permissions" style="display: none;">
            <h2>Security & Roles</h2>
            
            <div class="grid-2" style="margin-bottom: 2rem;">
                <div class="card">
                    <h3>Create Permission</h3>
                    <form id="createPermForm" class="flex-gap" style="margin-top: 0.75rem;">
                        <input type="text" id="permCode" placeholder="E.g., MAKE_COURSE" required>
                        <button type="submit" class="btn-success btn-small">Create</button>
                    </form>
                </div>

                <div class="card">
                    <h3>Assign Permission to Role</h3>
                    <form id="assignPermForm" style="margin-top: 0.75rem;">
                        <div class="flex-gap" style="margin-bottom: 0.75rem;">
                            <input type="number" id="assignPermId" placeholder="Permission ID" required style="width:30%;">
                            <select id="assignRoleId" required style="flex:1;">
                                <option value="">Loading...</option>
                            </select>
                        </div>
                        <div class="flex-gap">
                            <select id="assignAction" style="flex:1;">
                                <option value="assign">Assign</option>
                                <option value="unassign">Unassign</option>
                            </select>
                            <button type="submit" class="btn-small">Execute</button>
                        </div>
                    </form>
                </div>
            </div>

            <h3>Active Permissions</h3>
            <div class="grid-2" id="permissionsList">
                <div class="empty-state">Loading permissions...</div>
            </div>
        </div>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
